site_name: xlsx-strictdoc-sync
site_url: https://the78mole.github.io/xlsx-strictdoc-sync/
site_description: >-
  Synchronize requirements between Microsoft Excel and StrictDoc (.sdoc) files,
  with support for bidirectional sync and per-field direction overrides.
site_author: the78mole

repo_name: the78mole/xlsx-strictdoc-sync
repo_url: https://github.com/the78mole/xlsx-strictdoc-sync

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Bidirectional Sync: bidirectional-sync.md
  - CLI Reference: cli-reference.md
  - Architecture: architecture.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
